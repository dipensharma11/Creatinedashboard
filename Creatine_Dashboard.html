<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Creatine Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d1117;color:#e6edf3;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
:root{--accent:#58a6ff;--green:#3fb950;--amber:#d29922;--red:#f85149;--bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--border:#30363d;--text:#e6edf3;--muted:#8b949e}
.top-header{background:linear-gradient(135deg,#1a2332 0%,#0d1117 100%);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.brand{font-size:18px;font-weight:700;color:#fff}
.product-tabs{display:flex;border-bottom:2px solid var(--border);background:var(--bg2);padding:0 24px}
.ptab{padding:12px 24px;font-size:13px;font-weight:600;cursor:pointer;color:var(--muted);border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .2s}
.ptab:hover{color:var(--text)}
.controls-bar{background:var(--bg2);padding:12px 24px;display:flex;align-items:center;gap:16px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.ctrl-label{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.week-select{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:6px 12px;border-radius:6px;font-size:13px;cursor:pointer;min-width:180px}
.week-select:focus{outline:none;border-color:var(--accent)}
.trend-btn{background:var(--bg3);border:1px solid var(--border);color:var(--muted);padding:6px 14px;border-radius:6px;font-size:12px;cursor:pointer;transition:all .2s}
.trend-btn:hover,.trend-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.kpi-strip{display:flex;gap:12px;padding:16px 24px;flex-wrap:wrap}
.kpi-card{flex:1;min-width:140px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px 18px;position:relative;overflow:hidden}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent)}
.kpi-card.green::before{background:var(--green)}.kpi-card.amber::before{background:var(--amber)}.kpi-card.red::before{background:var(--red)}
.kpi-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px;font-weight:600}
.kpi-value{font-size:22px;font-weight:700;color:#fff}
.kpi-wow{font-size:11px;margin-top:4px}
.kpi-wow.up{color:var(--green)}.kpi-wow.down{color:var(--red)}.kpi-wow.flat{color:var(--muted)}
.main{padding:0 24px 24px}
.trend-panel{display:none;padding:20px 0}.trend-panel.visible{display:block}
.trend-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:800px){.trend-grid{grid-template-columns:1fr}}
.chart-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px}
.chart-title{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
.chart-wrap{position:relative;height:180px}
.dim-section{background:var(--bg2);border:1px solid var(--border);border-radius:10px;margin-bottom:16px;overflow:hidden}
.dim-header{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;background:var(--bg3);cursor:pointer;user-select:none;gap:8px;flex-wrap:wrap}
.dim-title{font-size:13px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:8px}
.dim-count{background:var(--bg);color:var(--muted);font-size:10px;padding:2px 7px;border-radius:10px;font-weight:500}
.dim-controls{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.dim-search{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:5px 10px;border-radius:6px;font-size:12px;width:150px}
.dim-search:focus{outline:none;border-color:var(--accent)}.dim-search::placeholder{color:var(--muted)}
.sort-btn{background:var(--bg);border:1px solid var(--border);color:var(--muted);padding:4px 10px;border-radius:6px;font-size:11px;cursor:pointer;white-space:nowrap}
.sort-btn.active{border-color:var(--accent);color:var(--accent)}
.toggle-arrow{color:var(--muted);font-size:12px;transition:transform .2s}
.toggle-arrow.collapsed{transform:rotate(-90deg)}
.dim-body{padding:0}.dim-body.collapsed{display:none}
.dim-table-wrap{overflow-x:auto}
.dim-chart-wrap{padding:12px 16px;border-bottom:1px solid var(--border)}
.dim-chart-inner{position:relative;height:160px}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{background:var(--bg3);color:var(--muted);text-transform:uppercase;font-size:10px;letter-spacing:.5px;padding:8px 12px;text-align:left;position:sticky;top:0;z-index:1}
thead th:not(:first-child){text-align:right}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:rgba(88,166,255,.05)}
td{padding:8px 12px;color:var(--text)}
td:not(:first-child){text-align:right;color:var(--muted)}
td.seg-name{color:var(--text);font-weight:500;max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.roas-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
.roas-g{background:rgba(63,185,80,.15);color:var(--green)}.roas-a{background:rgba(210,153,34,.15);color:var(--amber)}.roas-r{background:rgba(248,81,73,.15);color:var(--red)}.roas-n{color:var(--muted)}
.spend-bar-cell{min-width:100px}
.spend-bar-bg{background:var(--bg3);border-radius:3px;height:6px;overflow:hidden}
.spend-bar-fill{height:100%;border-radius:3px;background:var(--accent);transition:width .3s}
.spend-pct{font-size:10px;color:var(--muted);margin-top:2px}
.creator-chips{display:flex;flex-wrap:wrap;gap:4px}
.creator-chip{display:inline-flex;align-items:center;gap:4px;background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:2px 8px;font-size:10px;white-space:nowrap}
.chip-name{color:var(--text);font-weight:500}.chip-spend{color:var(--muted);font-size:9px}
.chip-roas{font-weight:700;font-size:10px}.chip-roas.g{color:var(--green)}.chip-roas.a{color:var(--amber)}.chip-roas.r{color:var(--red)}
.ad-explorer{background:var(--bg2);border:1px solid var(--border);border-radius:10px;margin-bottom:16px;overflow:hidden}
.ae-header{padding:14px 20px;background:var(--bg3);display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
.ae-title{font-size:14px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:8px}
.ae-body-wrap{padding:16px 20px}
.ae-filters{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;align-items:flex-end}
.ae-filter-group{display:flex;flex-direction:column;gap:4px;min-width:140px}
.ae-filter-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.ae-filter-select{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:6px;font-size:12px;cursor:pointer;width:100%}
.ae-filter-select:focus{outline:none;border-color:var(--accent)}
.ae-search-group{display:flex;flex-direction:column;gap:4px;flex:1;min-width:220px}
.ae-search{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:7px 12px;border-radius:6px;font-size:13px;width:100%}
.ae-search:focus{outline:none;border-color:var(--accent)}.ae-search::placeholder{color:var(--muted)}
.ae-clear-btn{background:transparent;border:1px solid var(--border);color:var(--muted);padding:6px 12px;border-radius:6px;font-size:12px;cursor:pointer;white-space:nowrap;align-self:flex-end}
.ae-clear-btn:hover{color:var(--text);border-color:var(--text)}
.ae-count{font-size:11px;color:var(--muted);padding:4px 0 8px}
.ae-table-wrap{overflow-x:auto;max-height:500px;overflow-y:auto}
.ae-table-wrap table thead th{position:sticky;top:0;z-index:2;background:var(--bg3)}
.ae-no-results{text-align:center;padding:32px;color:var(--muted);font-size:13px}
.no-data{padding:20px;color:var(--muted);font-size:12px;text-align:center}
</style>
</head>
<body>
<div class="top-header"><div><div class="brand">Creatine Dashboard</div><div style="font-size:11px;color:var(--muted)">Meta Ads Creative Analysis</div></div></div>

const PRODUCTS=["Creatine Powder", "Creatine Electrolyte"];
const PROD_COLORS={"Creatine Powder": "#00d9ff", "Creatine Electrolyte": "#ff6b35"};
const ALL_WEEKS=()=>{const s=new Set();PRODUCTS.forEach(p=>(DASH_DATA[p]||[]).forEach(w=>s.add(w.week_label)));return[...s];};
const DIM_KEYS=['narrative','adtype','format','source','funnel','creator','language','region'];

let curProd=PRODUCTS[0],curWeekIdx=0,curView='week',ovWeek=null,aeCollapsed=false;
const charts={},secState={};
let aeFilters={},aeSearch='';
function getWeeks(){return DASH_DATA[curProd]||[];}
function getWeek(){return getWeeks()[curWeekIdx]||{};}
function pCol(){return PROD_COLORS[curProd]||'#58a6ff';}
function buildTabs(){
  const el=document.getElementById('productTabs');
  el.innerHTML=`<div class="ptab" onclick="switchProd('Overview')" style="${curProd==='Overview'?'border-bottom-color:#58a6ff;color:#58a6ff':''}">Overview</div>`+
  PRODUCTS.map(p=>{const a=p===curProd;const c=a?PROD_COLORS[p]:'';return`<div class="ptab" onclick="switchProd('${p}')" style="border-bottom-color:${c};color:${c||''}">${p}</div>`;}).join('');
}
function switchProd(p){
  curProd=p;
  if(p==='Overview'){buildTabs();document.getElementById('weekPanel').style.display='none';document.getElementById('trendPanel').classList.remove('visible');document.getElementById('kpiStrip').innerHTML='';document.getElementById('overviewPanel').style.display='';renderOverview();return;}
  document.getElementById('overviewPanel').style.display='none';document.getElementById('weekPanel').style.display='';
  curWeekIdx=Math.max(0,(DASH_DATA[p]||[]).length-1);aeFilters={};aeSearch='';
  buildTabs();buildWeekSel();renderAll();
}
function buildWeekSel(){
  const sel=document.getElementById('weekSelect');
  sel.innerHTML=getWeeks().map((w,i)=>`<option value="${i}"${i===curWeekIdx?' selected':''}>${w.week_label}</option>`).join('');
  sel.onchange=e=>{curWeekIdx=+e.target.value;aeFilters={};aeSearch='';renderAll();};
}
function setView(v){
  curView=v;document.getElementById('trendPanel').classList.toggle('visible',v==='trend');document.getElementById('weekPanel').style.display=v==='week'?'':'none';
  document.getElementById('weekViewBtn').classList.toggle('active',v==='week');document.getElementById('trendViewBtn').classList.toggle('active',v==='trend');
  if(v==='trend')buildTrend();
}
const fS=v=>!v?'—':v>=1e5?'₹'+(v/1e5).toFixed(1)+'L':v>=1000?'₹'+Math.round(v).toLocaleString('en-IN'):'₹'+Math.round(v);
const fSs=v=>!v?'—':v>=1e5?'₹'+(v/1e5).toFixed(1)+'L':v>=1000?'₹'+Math.round(v/1000)+'K':'₹'+Math.round(v);
const fR=v=>v==null?'—':v.toFixed(2)+'x';
const fC=v=>v==null?'—':'₹'+Math.round(v).toLocaleString('en-IN');
const fN=v=>v==null?'—':Math.round(v).toLocaleString('en-IN');
const rCls=r=>!r?'':r>=0.65?'green':r>=0.50?'amber':'red';
const rBadge=r=>r==null?'<span class="roas-n">—</span>':`<span class="roas-badge ${r>=0.65?'roas-g':r>=0.50?'roas-a':'roas-r'}">${r.toFixed(2)}x</span>`;
function buildKpi(){
  const k=getWeek().kpis||{};const ws=getWeeks();const p=curWeekIdx>0?(ws[curWeekIdx-1]||{}).kpis||{}:null;
  document.querySelector(':root').style.setProperty('--accent',pCol());
  const wow=(c,pv,hi=true)=>{if(!p||pv==null||c==null)return'<span class="kpi-wow flat">—</span>';const d=c-pv;const pct=pv?(d/pv*100).toFixed(1):0;const g=hi?d>0:d<0;return`<span class="kpi-wow ${g?'up':'down'}">${d>0?'▲':'▼'} ${Math.abs(pct)}% WoW</span>`;};
  document.getElementById('kpiStrip').innerHTML=[
    {l:'Total Spend',v:fS(k.spend),w:wow(k.spend,p?.spend,false),c:''},
    {l:'New Customers',v:fN(k.nc),w:wow(k.nc,p?.nc,true),c:''},
    {l:'ROAS',v:fR(k.roas),w:wow(k.roas,p?.roas,true),c:rCls(k.roas)},
    {l:'CAC',v:fC(k.cac),w:wow(k.cac,p?.cac,false),c:''},
    {l:'AOV (PWC)',v:k.aov?'₹'+Math.round(k.aov).toLocaleString('en-IN'):'—',w:'',c:''}
  ].map(x=>`<div class="kpi-card ${x.c}"><div class="kpi-label">${x.l}</div><div class="kpi-value">${x.v}</div>${x.w}</div>`).join('');
}
function buildTrend(){
  const ws=getWeeks();const lb=ws.map(w=>w.week_label.replace(/, 2026/,''));const c=pCol();const g=document.getElementById('trendGrid');g.innerHTML='';
  [{k:'spend',l:'Spend (₹L)',f:v=>v?(v/1e5).toFixed(1):0},{k:'nc',l:'New Customers',f:v=>v?Math.round(v):0},{k:'roas',l:'ROAS',f:v=>v||0},{k:'cac',l:'CAC (₹)',f:v=>v?Math.round(v):0}].forEach(m=>{
    const d=document.createElement('div');d.className='chart-card';d.innerHTML=`<div class="chart-title">${m.l}</div><div class="chart-wrap"><canvas id="tc_${m.k}"></canvas></div>`;g.appendChild(d);
    setTimeout(()=>{const ctx=document.getElementById('tc_'+m.k);if(!ctx)return;if(charts['tc_'+m.k])charts['tc_'+m.k].destroy();
      charts['tc_'+m.k]=new Chart(ctx,{type:'line',data:{labels:lb,datasets:[{data:ws.map(w=>m.f((w.kpis||{})[m.k])),borderColor:c,backgroundColor:c+'20',fill:true,pointBackgroundColor:c,pointRadius:4,tension:.35,borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{color:'#21262d'},ticks:{color:'#8b949e',font:{size:9},maxRotation:35}},y:{grid:{color:'#21262d'},ticks:{color:'#8b949e',font:{size:9}}}}}});},50);
  });
}
function buildDims(){
  const week=getWeek();const con=document.getElementById('dimSections');con.innerHTML='';
  DIM_KEYS.forEach(key=>{
    const rows=(week.sections||{})[key]||[];if(!rows.length)return;
    const st=secState[key]||(secState[key]={collapsed:false,sortBy:'spend',search:''});
    const mx=Math.max(...rows.map(r=>r.spend||0));
    const d=document.createElement('div');d.className='dim-section';d.id='ds_'+key;
    d.innerHTML=`<div class="dim-header" onclick="togSec('${key}')">
      <div class="dim-title">${DIM_LABELS[key]}<span class="dim-count" id="dc_${key}">${rows.length}</span></div>
      <div class="dim-controls" onclick="event.stopPropagation()">
        <input class="dim-search" placeholder="Search…" id="srch_${key}" onclick="event.stopPropagation()" oninput="onSrch('${key}',this.value)" value="${st.search}"/>
        ${['spend','roas','nc','cac'].map(s=>`<button class="sort-btn${st.sortBy===s?' active':''}" onclick="event.stopPropagation();setSort('${key}','${s}')">${s==='nc'?'NCs':s.toUpperCase()}</button>`).join('')}
        <span class="toggle-arrow${st.collapsed?' collapsed':''}" id="arr_${key}">▼</span>
      </div></div>
      <div class="dim-body${st.collapsed?' collapsed':''}" id="db_${key}">
        <div class="dim-chart-wrap"><div class="dim-chart-inner"><canvas id="bc_${key}"></canvas></div></div>
        <div class="dim-table-wrap" id="dt_${key}"></div>
      </div>`;
    con.appendChild(d);renderDimTbl(key,sortFilt(key,rows),mx);renderDimChart(key,rows);
  });
}
function sortFilt(key,rows){
  const st=secState[key]||{sortBy:'spend',search:''};
  let r=rows.filter(x=>!st.search||x.segment.toLowerCase().includes(st.search.toLowerCase()));
  return[...r].sort((a,b)=>st.sortBy==='spend'?(b.spend||0)-(a.spend||0):st.sortBy==='roas'?(b.roas||0)-(a.roas||0):st.sortBy==='nc'?(b.nc||0)-(a.nc||0):(a.cac||999999)-(b.cac||999999));
}
function renderDimTbl(key,rows,mx){
  const el=document.getElementById('dt_'+key);if(!el)return;
  const dc=document.getElementById('dc_'+key);if(dc)dc.textContent=rows.length;
  if(!rows.length){el.innerHTML='<div class="no-data">No results</div>';return;}
  const isN=key==='narrative';
  el.innerHTML=`<table><thead><tr><th style="min-width:180px">Segment</th><th>Spend</th><th>Spend %</th><th>NCs</th><th>ROAS</th><th>CAC</th>${isN?'<th style="text-align:left;min-width:260px">Top Creators by Spend</th>':''}</tr></thead><tbody>${
    rows.map(r=>{
      let cc='';
      if(isN){
        if(r.top_creators&&r.top_creators.length){
          cc=`<td style="text-align:left"><div class="creator-chips">${r.top_creators.map(c=>{

            return`<span class="creator-chip"><span class="chip-name">${c.name}</span><span class="chip-spend">${sp}</span><span class="chip-roas ${rc}">${c.roas.toFixed(2)}x</span></span>`;
          }).join('')}</div></td>`;
        } else cc='<td style="color:var(--muted);text-align:left">—</td>';
      }
      return`<tr><td class="seg-name" title="${r.segment}">${r.segment}</td><td>${fSs(r.spend)}</td><td class="spend-bar-cell"><div class="spend-bar-bg"><div class="spend-bar-fill" style="width:${Math.round((r.spend||0)/mx*100)}%"></div></div><div class="spend-pct">${r.spend_pct!=null?r.spend_pct.toFixed(1)+'%':'—'}</div></td><td>${r.nc?r.nc.toLocaleString('en-IN'):'0'}</td><td>${rBadge(r.roas)}</td><td>${r.cac?'₹'+Math.round(r.cac).toLocaleString('en-IN'):'—'}</td>${cc}</tr>`;
    }).join('')}</tbody></table>`;
}
function renderDimChart(key,rows){

function togSec(k){const s=secState[k]||(secState[k]={collapsed:false,sortBy:'spend',search:''});s.collapsed=!s.collapsed;document.getElementById('db_'+k)?.classList.toggle('collapsed',s.collapsed);document.getElementById('arr_'+k)?.classList.toggle('collapsed',s.collapsed);}
function onSrch(k,v){const s=secState[k]||(secState[k]={collapsed:false,sortBy:'spend',search:''});s.search=v;const rows=(getWeek().sections||{})[k]||[];renderDimTbl(k,sortFilt(k,rows),Math.max(...rows.map(r=>r.spend||0)));}
function setSort(k,by){const s=secState[k]||(secState[k]={collapsed:false,sortBy:'spend',search:''});s.sortBy=by;document.querySelectorAll('#ds_'+k+' .sort-btn').forEach(b=>{const t=b.textContent.toLowerCase();b.classList.toggle('active',t===by||(by==='nc'&&t==='ncs'));});onSrch(k,s.search);}
const AE_DIMS=['narrative','region','language','adtype','format','source','funnel','creator'];
const AE_LBL={narrative:'Narrative',region:'Region',language:'Language',adtype:'Ad Type',format:'Format',source:'Source',funnel:'Funnel',creator:'Creator'};
function buildAE(){
  const ads=(getWeek().ads)||[];const con=document.getElementById('adExplorer');if(!ads.length){con.innerHTML='';return;}
  const opts={};AE_DIMS.forEach(d=>{opts[d]=[...new Set(ads.map(a=>a[d]||'').filter(Boolean))].sort();});
  con.innerHTML=`<div class="ad-explorer"><div class="ae-header" onclick="togAE()"><div class="ae-title"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>Ad Explorer<span class="dim-count" id="ae-badge">${ads.length} ads</span></div><span class="toggle-arrow${aeCollapsed?' collapsed':''}" id="ae-arr">▼</span></div>
  <div id="ae-body" class="dim-body${aeCollapsed?' collapsed':''}"><div class="ae-body-wrap">
    <div class="ae-filters">
      ${AE_DIMS.map(d=>`<div class="ae-filter-group"><div class="ae-filter-label">${AE_LBL[d]}</div><select class="ae-filter-select" id="ae_${d}" onchange="aeFilter()"><option value="">All</option>${opts[d].map(v=>`<option value="${v}"${aeFilters[d]===v?' selected':''}>${v}</option>`).join('')}</select></div>`).join('')}

      <button class="ae-clear-btn" onclick="aeClear()">✕ Clear</button>
    </div>
    <div id="ae-tbl"></div>
  </div></div></div>`;
  renderAE();
}
function togAE(){aeCollapsed=!aeCollapsed;document.getElementById('ae-body')?.classList.toggle('collapsed',aeCollapsed);document.getElementById('ae-arr')?.classList.toggle('collapsed',aeCollapsed);}
function aeFilter(){AE_DIMS.forEach(d=>{const el=document.getElementById('ae_'+d);if(el)aeFilters[d]=el.value;});renderAE();}
function aeClear(){aeFilters={};aeSearch='';const si=document.getElementById('ae-srch');if(si)si.value='';AE_DIMS.forEach(d=>{const el=document.getElementById('ae_'+d);if(el)el.value='';});renderAE();}
function renderAE(){
  const ads=(getWeek().ads)||[];
  const f=ads.filter(a=>{if(aeSearch&&!a.name.toLowerCase().includes(aeSearch.toLowerCase()))return false;for(const d of AE_DIMS){if(aeFilters[d]&&(a[d]||'')!==aeFilters[d])return false;}return true;}).sort((a,b)=>(b.spend||0)-(a.spend||0));
  const badge=document.getElementById('ae-badge');if(badge)badge.textContent=f.length+' ads';
  const tc=document.getElementById('ae-tbl');if(!tc)return;
  if(!f.length){tc.innerHTML='<div class="ae-no-results">No ads match the filters.</div>';return;}
  const mx=Math.max(...f.map(a=>a.spend||0),1);
  tc.innerHTML=`<div class="ae-count">Showing ${f.length} of ${ads.length} ads</div><div class="ae-table-wrap"><table>
    <thead><tr><th style="min-width:340px;text-align:left">Ad Name</th><th>Spend</th><th>Spend%</th><th>NCs</th><th>ROAS</th><th>CAC</th><th style="text-align:left">Narrative</th><th style="text-align:left">Region</th><th style="text-align:left">Language</th><th style="text-align:left">Ad Type</th><th style="text-align:left">Format</th><th style="text-align:left">Source</th></tr></thead>
    <tbody>${f.map(a=>`<tr>
      <td style="font-size:11px;word-break:break-all;white-space:normal;min-width:340px;padding:8px 12px;color:var(--text)">${a.name}</td>
      <td>${fSs(a.spend)}</td>
      <td class="spend-bar-cell"><div class="spend-bar-bg"><div class="spend-bar-fill" style="width:${Math.round((a.spend||0)/mx*100)}%"></div></div><div class="spend-pct">${a.spend_pct!=null?a.spend_pct.toFixed(1)+'%':'—'}</div></td>
      <td>${a.nc?a.nc.toLocaleString('en-IN'):'0'}</td><td>${rBadge(a.roas)}</td><td>${a.cac?'₹'+Math.round(a.cac).toLocaleString('en-IN'):'—'}</td>
      <td style="text-align:left;color:var(--muted);font-size:11px;white-space:nowrap">${a.narrative||'—'}</td>
      <td style="text-align:left;color:var(--muted);font-size:11px;white-space:nowrap">${a.region||'—'}</td>
      <td style="text-align:left;color:var(--muted);font-size:11px;white-space:nowrap">${a.language||'—'}</td>
      <td style="text-align:left;color:var(--muted);font-size:11px;white-space:nowrap">${a.adtype||'—'}</td>
      <td style="text-align:left;color:var(--muted);font-size:11px;white-space:nowrap">${a.format||'—'}</td>
      <td style="text-align:left;color:var(--muted);font-size:11px;white-space:nowrap">${a.source||'—'}</td>
    </tr>`).join('')}</tbody></table></div>`;
}
function wkFor(p,lb){return(DASH_DATA[p]||[]).find(w=>w.week_label===lb)||null;}
function prevWk(p,lb){const ws=DASH_DATA[p]||[];const i=ws.findIndex(w=>w.week_label===lb);return i>0?ws[i-1]:null;}
function renderOverview(){
  const allW=ALL_WEEKS();const wl=ovWeek||allW[allW.length-1];ovWeek=wl;
  const con=document.getElementById('overviewPanel');
  const maxR=Math.max(...PRODUCTS.map(p=>{const d=wkFor(p,wl);return d?d.kpis.roas:0;}),0.01);
  const cards=PRODUCTS.map(p=>{const d=wkFor(p,wl);const k=d?d.kpis:null;const pv=prevWk(p,wl);const pk=pv?pv.kpis:null;const col=PROD_COLORS[p];const rc=k?(k.roas>=0.65?'#3fb950':k.roas>=0.50?'#d29922':'#f85149'):'#8b949e';const chg=k&&pk&&pk.roas?((k.roas-pk.roas)/pk.roas*100).toFixed(1):null;
    return`<div style="background:#161b22;border:1px solid #30363d;border-left:4px solid ${col};border-radius:10px;padding:18px;cursor:pointer;flex:1;min-width:200px" onclick="switchProd('${p}')"><div style="font-size:13px;font-weight:700;color:#fff;margin-bottom:12px">${p}</div>${k?`<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px"><div style="background:#0d1117;border-radius:6px;padding:10px"><div style="font-size:9px;color:#8b949e;text-transform:uppercase;margin-bottom:4px">Spend</div><div style="font-size:18px;font-weight:700;color:#fff">${fS(k.spend)}</div></div><div style="background:#0d1117;border-radius:6px;padding:10px"><div style="font-size:9px;color:#8b949e;text-transform:uppercase;margin-bottom:4px">ROAS</div><div style="font-size:18px;font-weight:700;color:${rc}">${fR(k.roas)}</div>${chg?`<div style="font-size:10px;color:${+chg>=0?'#3fb950':'#f85149'}">${+chg>=0?'▲':'▼'} ${Math.abs(+chg).toFixed(1)}%</div>`:''}</div><div style="background:#0d1117;border-radius:6px;padding:10px"><div style="font-size:9px;color:#8b949e;text-transform:uppercase;margin-bottom:4px">New Customers</div><div style="font-size:18px;font-weight:700;color:#fff">${fN(k.nc)}</div></div><div style="background:#0d1117;border-radius:6px;padding:10px"><div style="font-size:9px;color:#8b949e;text-transform:uppercase;margin-bottom:4px">CAC</div><div style="font-size:18px;font-weight:700;color:#fff">${fC(k.cac)}</div></div></div>`:`<div style="color:#8b949e;font-size:12px;padding:12px 0">No data for this week</div>`}</div>`;}).join('');
  const wowB=PRODUCTS.map(p=>{const d=wkFor(p,wl);if(!d)return'';const pv=prevWk(p,wl);const k=d.kpis;const pk=pv?pv.kpis:null;const col=PROD_COLORS[p];const rc=k.roas>=0.65?'#3fb950':k.roas>=0.50?'#d29922':'#f85149';const cW=Math.round(k.roas/maxR*100);const pW=pk?Math.round(pk.roas/maxR*100):0;const chg=pk&&pk.roas?((k.roas-pk.roas)/pk.roas*100).toFixed(1):null;
    return`<div style="margin-bottom:16px"><div style="display:flex;justify-content:space-between;margin-bottom:5px"><span style="font-size:12px;font-weight:700;color:${col}">${p}</span>${chg?`<span style="font-size:11px;font-weight:700;color:${+chg>=0?'#3fb950':'#f85149'}">${+chg>=0?'+':''}${chg}% WoW</span>`:''}</div><div style="display:flex;align-items:center;gap:8px;margin-bottom:4px"><span style="font-size:10px;color:#8b949e;width:70px">This week</span><div style="flex:1;background:#21262d;border-radius:3px;height:14px;overflow:hidden"><div style="width:${cW}%;height:100%;background:${rc};border-radius:3px"></div></div><span style="font-size:11px;font-weight:700;color:${rc};width:45px;text-align:right">${fR(k.roas)}</span></div>${pk?`<div style="display:flex;align-items:center;gap:8px"><span style="font-size:10px;color:#8b949e;width:70px">Prev week</span><div style="flex:1;background:#21262d;border-radius:3px;height:14px;overflow:hidden"><div style="width:${pW}%;height:100%;background:#484f58;border-radius:3px"></div></div><span style="font-size:11px;color:#8b949e;width:45px;text-align:right">${fR(pk.roas)}</span></div>`:''}</div>`;}).join('');
  const wkOpts=allW.map(w=>`<option value="${w}"${w===wl?' selected':''}>${w}</option>`).join('');
  con.innerHTML=`<div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap"><span style="font-size:11px;color:#8b949e;font-weight:600;text-transform:uppercase;letter-spacing:.5px">Week</span><select style="background:#21262d;border:1px solid #30363d;color:#e6edf3;padding:6px 12px;border-radius:6px;font-size:13px;cursor:pointer" onchange="ovWeek=this.value;renderOverview()">${wkOpts}</select></div>
  <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px">${cards}</div>
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:20px">
    <div style="background:#161b22;border:1px solid #30363d;border-radius:10px;padding:16px"><div style="font-size:11px;font-weight:700;color:#8b949e;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px">Spend Split</div><div style="position:relative;height:160px"><canvas id="ov_sp"></canvas></div></div>
    <div style="background:#161b22;border:1px solid #30363d;border-radius:10px;padding:16px"><div style="font-size:11px;font-weight:700;color:#8b949e;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px">ROAS by Product</div><div style="position:relative;height:160px"><canvas id="ov_ro"></canvas></div></div>
    <div style="background:#161b22;border:1px solid #30363d;border-radius:10px;padding:16px"><div style="font-size:11px;font-weight:700;color:#8b949e;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px">New Customers</div><div style="position:relative;height:160px"><canvas id="ov_nc"></canvas></div></div>
  </div>
  <div style="background:#161b22;border:1px solid #30363d;border-radius:10px;padding:16px"><div style="font-size:11px;font-weight:700;color:#8b949e;text-transform:uppercase;letter-spacing:.5px;margin-bottom:16px">WoW ROAS Comparison</div>${wowB}</div>`;
  setTimeout(()=>{
    const pp=PRODUCTS.filter(p=>wkFor(p,wl));const co=pp.map(p=>PROD_COLORS[p]);
    ['ov_sp','ov_ro','ov_nc'].forEach(id=>{if(charts[id])charts[id].destroy();});
    const c1=document.getElementById('ov_sp');if(c1)charts['ov_sp']=new Chart(c1,{type:'doughnut',data:{labels:pp,datasets:[{data:pp.map(p=>wkFor(p,wl).kpis.spend||0),backgroundColor:co.map(c=>c+'cc'),borderColor:'#0d1117',borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#8b949e',font:{size:10}},position:'bottom'},tooltip:{callbacks:{label:d=>`${d.label}: ${fS(d.raw)}`}}}}});
    const r2=pp.map(p=>wkFor(p,wl).kpis.roas||0);const c2=document.getElementById('ov_ro');if(c2)charts['ov_ro']=new Chart(c2,{type:'bar',data:{labels:pp,datasets:[{data:r2,backgroundColor:r2.map(r=>r>=0.65?'#3fb95099':r>=0.5?'#d2992299':'#f8514999'),borderColor:r2.map(r=>r>=0.65?'#3fb950':r>=0.5?'#d29922':'#f85149'),borderWidth:1.5}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{color:'#21262d'},ticks:{color:'#8b949e',font:{size:9}},max:1},y:{grid:{color:'#21262d'},ticks:{color:'#8b949e',font:{size:10}}}}}});
    const c3=document.getElementById('ov_nc');if(c3)charts['ov_nc']=new Chart(c3,{type:'bar',data:{labels:pp,datasets:[{data:pp.map(p=>wkFor(p,wl).kpis.nc||0),backgroundColor:co.map(c=>c+'88'),borderColor:co,borderWidth:1.5}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{color:'#21262d'},ticks:{color:'#8b949e',font:{size:9}}},y:{grid:{color:'#21262d'},ticks:{color:'#8b949e',font:{size:9}}}}}});
  },80);
}

buildTabs();curWeekIdx=Math.max(0,(DASH_DATA[curProd]||[]).length-1);buildWeekSel();setView('week');renderAll();document.getElementById('weekViewBtn').classList.add('active');
